name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Go test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...
      - run: go build -o dist/notify-mail-windows-amd64.exe ./cmd/notify-mail
